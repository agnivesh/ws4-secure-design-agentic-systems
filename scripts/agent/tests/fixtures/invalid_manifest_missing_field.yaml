schema_version: 1
description: |
  An example skill manifest missing the required `name` field.
version: 0.1.0
governance:
  license: CC-BY-4.0
  ai_attribution: |
    Co-authored-by: AI Assistant <ai-assistant@coalitionforsecureai.org>
arguments:
  - name: target
    type: string
    required: true
dependencies:
  tools:
    - id: filesystem
      required: true
      capabilities: [read, write]
output:
  primary:
    type: markdown
    location: out/{target}.md
boundaries:
  does_not:
    - Modify inputs
failure_modes:
  - condition: input not found
    action: halt
narrative: SKILL.md
